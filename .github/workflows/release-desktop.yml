name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix, e.g. 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          npm pkg set version="$VERSION"

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        run: npm pkg set version="${{ inputs.version }}"

      - name: Build renderer
        env:
          VITE_API_URL: https://api.anyrem.anzita.com/api
        run: |
          pnpm icons
          pnpm build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder ${{ matrix.args }} --publish always

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: anyrem-${{ matrix.os }}
          path: release/*
          if-no-files-found: ignore
