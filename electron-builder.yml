# https://www.electron.build/docs/configuration
appId: com.anyrem.desktop
productName: AnyRem
copyright: Copyright © 2026 AnyRem
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/lazy-val/**/*
  - node_modules/semver/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/sax/**/*

asar: true
npmRebuild: false
nodeGypRebuild: false

extraMetadata:
  main: dist-electron/main/index.js

protocols:
  - name: AnyRem Auth
    schemes: [anyrem]

linux:
  target: [AppImage, deb]
  category: Office
  maintainer: AnyRem <nguyenanhvu.work@gmail.com>
  mimeTypes: [x-scheme-handler/anyrem]
  appImage:
    type: 2
  desktop:
    entry:
      Name: AnyRem
      MimeType: x-scheme-handler/anyrem;

win:
  target: [nsis]
  signtoolOptions:
    publisherName: AnyRem

mac:
  target: [dmg, zip]
  category: public.app-category.productivity
  # Unsigned CI builds. Remove identity:null and set hardenedRuntime when MACOS_CSC_LINK secret exists.
  identity: null
  gatekeeperAssess: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: AnyRem

dmg:
  title: AnyRem ${version}

publish:
  provider: github
  owner: anyrem-org
  repo: anyrem-desktop
  releaseType: release
